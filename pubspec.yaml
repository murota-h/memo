name: memo
description: "Kaleidoscope Memo - 日付に紐づく美しい日記帳"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状態管理
  flutter_riverpod: ^2.5.1

  # ローカルDB
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # カレンダー
  table_calendar: ^3.1.2

  # 画像
  image_picker: ^1.1.2

  # 共有
  share_plus: ^9.0.0

  # UUID
  uuid: ^4.4.0

  # アニメーション
  flutter_animate: ^4.5.0

  # フォント
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
